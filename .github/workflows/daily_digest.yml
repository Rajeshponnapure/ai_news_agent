name: AI News Agent — Daily Digest

# Runs daily at 00:30 UTC = 06:00 AM IST
# Sends a comprehensive PDF digest of all AI updates from the past 24 hours.
# This is a SUMMARY email — real-time alerts are sent by the ingest.yml workflow.
on:
  schedule:
    - cron: "30 0 * * *"    # 00:30 UTC = 06:00 AM IST every day
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-digest:
    name: Generate & Send PDF Digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Install DejaVu fonts for PDF Unicode support on Ubuntu
      - name: Install Unicode fonts for PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-dejavu-core

      # Get the latest database with all accumulated entries
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/ai_updates.db
          key: ainews-db-v2-${{ github.run_id }}
          restore-keys: |
            ainews-db-v2-

      - name: Create directories
        run: mkdir -p data reports

      # Run a final ingestion pass + send the full digest
      - name: Generate and send daily PDF digest
        env:
          DB_ENGINE: sqlite
          SQLITE_PATH: data/ai_updates.db
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EMAIL_ENABLED: "true"
          EMAIL_SMTP_HOST: smtp.gmail.com
          EMAIL_SMTP_PORT: "587"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          MAX_RETRIES: "3"
          RETRY_DELAY_SECONDS: "5"
        run: python runner.py both

      # Keep PDF as downloadable artifact in GitHub (backup)
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AI-Digest-${{ github.run_number }}
          path: reports/*.pdf
          retention-days: 30

      # Clean up old entries + save DB
      - name: Cleanup old database entries
        env:
          SQLITE_PATH: data/ai_updates.db
        run: python runner.py cleanup

      - name: Save updated database
        uses: actions/cache@v4
        with:
          path: data/ai_updates.db
          key: ainews-db-v2-${{ github.run_id }}
