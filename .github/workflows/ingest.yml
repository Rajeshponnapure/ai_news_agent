name: AI News Agent — Ingest & Alert

# Runs every 30 minutes so major AI launches are detected quickly.
# After every ingestion, checks for new high-priority events and sends
# an immediate alert email if something important was found.
#
# Free tier math:
#   48 runs/day × ~4 min each = ~192 min/day = ~5760 min/month
#   GitHub free tier = 2000 min/month for PUBLIC repos (unlimited)
#   For PRIVATE repos: still fits if kept to 30 min intervals
on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes (GitHub max frequency) for near real-time updates
  workflow_dispatch:           # Manual trigger from GitHub UI anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest-and-alert:
    name: Ingest & Send Alerts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the SQLite database so entries accumulate across runs
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/ai_updates.db
          key: ainews-db-v2-${{ github.ref_name }}
          restore-keys: |
            ainews-db-v2-

      - name: Create directories
        run: mkdir -p data reports

      # Ingest all sources + immediately alert if new launches detected
      - name: Ingest sources and check for alerts
        env:
          DB_ENGINE: sqlite
          SQLITE_PATH: data/ai_updates.db
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EMAIL_ENABLED: "true"
          EMAIL_SMTP_HOST: smtp.gmail.com
          EMAIL_SMTP_PORT: "587"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          MAX_RETRIES: "3"
          RETRY_DELAY_SECONDS: "5"
        run: python runner.py ingest-alert

      # Save database so next run has accumulated data
      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: data/ai_updates.db
          key: ainews-db-v2-${{ github.ref_name }}
